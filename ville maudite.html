<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SURVIE: VILLE MAUDITE</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; user-select: none; -webkit-user-select: none; }
        
        /* CANVAS FORCÉ EN PREMIER PLAN ARRIÈRE */
        #game-canvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* INTERFACE AU DESSUS */
        #ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 10; pointer-events: none; }
        
        /* Effet de vignette (bords sombres) */
        #vignette { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 60%, rgba(0,0,0,0.9) 100%); pointer-events: none; }
        
        #objective { position: absolute; top: 30px; left: 50%; transform: translateX(-50%); color: #ff3333; font-weight: bold; font-size: 1.2rem; text-transform: uppercase; letter-spacing: 2px; text-shadow: 0 0 10px red; display: none; text-align: center; width: 90%; }
        
        #hud-bottom { position: absolute; bottom: 0; left: 0; width: 100%; height: 180px; background: linear-gradient(to top, rgba(0,0,0,0.95), transparent); pointer-events: none; display: flex; justify-content: center; align-items: flex-end; padding-bottom: 30px; }
        
        #health-bar { width: 280px; height: 12px; background: #222; border: 1px solid #555; transform: skewX(-20deg); overflow: hidden; }
        #hp-fill { width: 100%; height: 100%; background: #d00; transition: width 0.2s; box-shadow: 0 0 15px #d00; }

        /* Contrôles Tactiles Adaptés Mobile */
        #controls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; box-sizing: border-box; pointer-events: auto; }
        .joystick-zone { width: 110px; height: 110px; background: rgba(255,255,255,0.05); border: 2px solid rgba(255,255,255,0.2); border-radius: 50%; position: relative; backdrop-filter: blur(2px); }
        .joystick-knob { width: 50px; height: 50px; background: rgba(255,0,0,0.6); border-radius: 50%; position: absolute; top: 30px; left: 30px; pointer-events: none; box-shadow: 0 0 10px red; }
        #fire-btn { width: 90px; height: 90px; background: rgba(200,0,0,0.3); border: 3px solid #ff0000; border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 2.5rem; color: white; box-shadow: 0 0 20px rgba(255,0,0,0.5); }

        /* Écran Intro */
        #intro-screen { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: #ff3333; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 100; text-align: center; box-shadow: inset 0 0 100px #300; }
        #intro-screen h1 { font-size: 3rem; margin-bottom: 20px; letter-spacing: 5px; text-transform: uppercase; animation: pulse 2s infinite; }
        @keyframes pulse { 0% {opacity: 0.8;} 50% {opacity: 1; text-shadow: 0 0 20px red;} 100% {opacity: 0.8;} }
        #start-btn { padding: 20px 50px; font-size: 1.8rem; background: #500; color: #fff; border: 2px solid red; cursor: pointer; letter-spacing: 2px; font-weight: bold; }

        /* Écran Game Over */
        #game-over { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(50,0,0,0.9); color: red; z-index: 200; flex-direction: column; justify-content: center; align-items: center; text-align: center; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

    <!-- CANVAS 3D -->
    <canvas id="game-canvas"></canvas>

    <!-- INTERFACE UTILISATEUR -->
    <div id="ui-layer">
        <div id="vignette"></div>
        <div id="objective">OBJECTIF : ATTEINDRE LA BALISE ROUGE</div>
        
        <div id="hud-bottom">
            <div id="health-bar"><div id="hp-fill"></div></div>
        </div>

        <div id="controls">
            <div class="joystick-zone" id="joy-move"><div class="joystick-knob"></div></div>
            <div id="fire-btn">🔥</div>
            <div class="joystick-zone" id="joy-look"><div class="joystick-knob"></div></div>
        </div>
    </div>

    <!-- INTRO -->
    <div id="intro-screen">
        <h1>Zone Maudite</h1>
        <p>Écoutez les voix. Traversez l'obscurité.<br>Ne vous arrêtez pas.</p>
        <button id="start-btn">ENTRER DANS LA VILLE</button>
    </div>

    <!-- GAME OVER -->
    <div id="game-over">
        <h1>VOUS ÊTES MORT</h1>
        <button onclick="location.reload()" style="padding:10px 30px; font-size:1.5rem; background:red; color:white; border:none;">RÉESSAYER</button>
    </div>

    <script>
        // --- GESTION AUDIO (Musique Effrayante générée par code) ---
        const AudioManager = {
            ctx: null,
            init: function() {
                window.AudioContext = window.AudioContext || window.webkitAudioContext;
                this.ctx = new AudioContext();
                this.startDrone();
                this.playHeartbeat();
            },
            startDrone: function() {
                // Son grave, basse fréquence, dissonant
                const osc = this.ctx.createOscillator();
                const osc2 = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                const filter = this.ctx.createBiquadFilter();

                osc.type = 'sawtooth';
                osc.frequency.value = 55; // La grave

                osc2.type = 'square';
                osc2.frequency.value = 56.5; // Légèrement désaccordé pour effet "battement"

                filter.type = 'lowpass';
                filter.frequency.value = 300; // Son étouffé

                gain.gain.value = 0.08; // Volume faible mais constant

                osc.connect(filter);
                osc2.connect(filter);
                filter.connect(gain);
                gain.connect(this.ctx.destination);

                osc.start();
                osc2.start();
            },
            playHeartbeat: function() {
                // Son de battement de coeur aléatoire
                setInterval(() => {
                    if(!this.ctx) return;
                    const osc = this.ctx.createOscillator();
                    const gain = this.ctx.createGain();
                    osc.connect(gain);
                    gain.connect(this.ctx.destination);
                    
                    osc.frequency.setValueAtTime(100, this.ctx.currentTime);
                    osc.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.3);
                    
                    gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.001, this.ctx.currentTime + 0.3);

                    osc.start();
                    osc.stop(this.ctx.currentTime + 0.3);
                    
                    // Prochain battement aléatoire entre 1s et 2s
                    this.nextBeat = setTimeout(() => this.playHeartbeat(), 1000 + Math.random()*1000);
                }, 1000);
            },
            playGunshot: function() {
                if(!this.ctx) return;
                const osc = this.ctx.createOscillator();
                const gain = this.ctx.createGain();
                osc.connect(gain);
                gain.connect(this.ctx.destination);
                osc.frequency.setValueAtTime(800, this.ctx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                gain.gain.setValueAtTime(0.5, this.ctx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, this.ctx.currentTime + 0.1);
                osc.start(); osc.stop(this.ctx.currentTime + 0.1);
            }
        };

        // --- MOTEUR 3D ---
        let scene, camera, renderer;
        let player = { x: 0, y: 1.6, z: 25, rotY: Math.PI, hp: 100 };
        let map = [];
        let walls = [];
        let zombies = [];
        let goalReached = false;
        
        const MAP_LENGTH = 40;
        const START_Z = 20;
        const END_Z = -20;

        function init() {
            // Scène
            scene = new THREE.Scene();
            scene.background = new THREE.Color(0x050510); // Noir bleuté (pas noir pur)
            scene.fog = new THREE.FogExp2(0x050510, 0.03); // Brouillard dense

            // Caméra
            camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 100);
            
            // Renderer (Important : récupérer l'élément canvas existant)
            renderer = new THREE.WebGLRenderer({ canvas: document.getElementById('game-canvas'), antialias: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.shadowMap.enabled = true;

            // Lumières
            const ambient = new THREE.AmbientLight(0x222222);
            scene.add(ambient);

            // Génération
            buildCity();
            
            // Joueur
            player.x = 0;
            player.z = START_Z;

            setupControls();
            animate();
            
            // HUD
            document.getElementById('objective').style.display = 'block';
        }

        // --- GÉNÉRATION VILLE ---
        function buildCity() {
            const wallGeo = new THREE.BoxGeometry(1, 3, 1);
            const matWall = new THREE.MeshStandardMaterial({ color: 0x332222 });
            const matRoad = new THREE.MeshStandardMaterial({ color: 0x111111 });

            // Sol
            const floor = new THREE.Mesh(new THREE.PlaneGeometry(100, 100), matRoad);
            floor.rotation.x = -Math.PI/2;
            scene.add(floor);

            // Création de la ville
            for (let x = -8; x <= 8; x++) {
                for (let z = START_Z; z >= END_Z; z--) {
                    if (!map[x]) map[x] = [];
                    map[x][z] = 0;

                    // Route centrale
                    if (x === 0 || x === 1) {
                        map[x][z] = 0;
                        // Lampadaires
                        if (z % 6 === 0) createStreetLight(x + 1.5, z);
                    } else {
                        // Bâtiments
                        if (Math.random() < 0.6) {
                            const h = 2 + Math.random() * 3;
                            const positions = [
                                [x-1,z-1],[x,z-1],[x+1,z-1],
                                [x-1,z],[x+1,z],
                                [x-1,z+1],[x,z+1],[x+1,z+1]
                            ];
                            
                            positions.forEach(pos => {
                                const w = new THREE.Mesh(wallGeo, matWall);
                                w.position.set(pos[0], h/2, pos[1]);
                                w.scale.y = h;
                                w.castShadow = true;
                                scene.add(w);
                                walls.push(w);
                                map[pos[0]][pos[1]] = 1;
                            });

                            // Toit opaque
                            const roof = new THREE.Mesh(new THREE.BoxGeometry(3.2, 0.2, 3.2), matWall);
                            roof.position.set(x, h + 0.1, z);
                            scene.add(roof);
                        }
                    }
                }
            }

            // Balise Fin
            const b = new THREE.Mesh(new THREE.CylinderGeometry(0.5, 0.5, 20, 8), new THREE.MeshBasicMaterial({color: 0xff0000}));
            b.position.set(0, 10, END_Z);
            scene.add(b);
            
            const l = new THREE.PointLight(0xff0000, 2, 15);
            l.position.set(0, 5, END_Z);
            scene.add(l);
        }

        function createStreetLight(x, z) {
            const p = new THREE.Mesh(new THREE.CylinderGeometry(0.1, 0.1, 4), new THREE.MeshStandardMaterial({color:0x111}));
            p.position.set(x, 2, z);
            
            const bulb = new THREE.Mesh(new THREE.SphereGeometry(0.3), new THREE.MeshBasicMaterial({color: 0xffaa00}));
            bulb.position.set(0, 2, 0);
            p.add(bulb);

            const l = new THREE.PointLight(0xffaa00, 1, 10);
            p.add(l);

            scene.add(p);
            walls.push(p); // C'est un obstacle
        }

        // --- CONTRÔLES TACTILES (Optimisés) ---
        function setupControls() {
            let mx = 0, mz = 0, ry = 0;
            const jL = document.getElementById('joy-move');
            const kL = jL.querySelector('.joystick-knob');
            const jR = document.getElementById('joy-look');
            const kR = jR.querySelector('.joystick-knob');
            let tL = null, tR = null, oL = {x:0,y:0}, oR = {x:0,y:0};

            // Joystick Marche
            jL.addEventListener('touchstart', e => {
                e.preventDefault(); tL = e.changedTouches[0].identifier;
                const r = jL.getBoundingClientRect(); oL = {x: r.left + r.width/2, y: r.top + r.height/2};
            }, {passive:false});
            jL.addEventListener('touchmove', e => {
                e.preventDefault();
                for(let i=0; i<e.changedTouches.length; i++) if(e.changedTouches[i].identifier===tL) {
                    const dx = e.changedTouches[i].clientX - oL.x; const dy = e.changedTouches[i].clientY - oL.y;
                    let d = Math.sqrt(dx*dx + dy*dy); if(d > 40) { d=40; const r=40/d; dx*=r; dy*=r; }
                    kL.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
                    mx = dx / 40; mz = dy / 40;
                }
            }, {passive:false});
            jL.addEventListener('touchend', () => { tL = null; mx = 0; mz = 0; kL.style.transform = 'translate(-50%,-50%)'; });

            // Joystick Visée
            jR.addEventListener('touchstart', e => {
                e.preventDefault(); tR = e.changedTouches[0].identifier;
                const r = jR.getBoundingClientRect(); oR = {x: r.left + r.width/2, y: r.top + r.height/2};
            }, {passive:false});
            jR.addEventListener('touchmove', e => {
                e.preventDefault();
                for(let i=0; i<e.changedTouches.length; i++) if(e.changedTouches[i].identifier===tR) {
                    const dx = e.changedTouches[i].clientX - oR.x;
                    kR.style.transform = `translate(calc(-50% + ${dx}px), -50%)`;
                    ry = dx * 0.04;
                }
            }, {passive:false});
            jR.addEventListener('touchend', () => { tR = null; ry = 0; kR.style.transform = 'translate(-50%,-50%)'; });

            // Tir
            const fb = document.getElementById('fire-btn');
            fb.addEventListener('touchstart', (e) => { e.preventDefault(); fb.style.background='red'; shoot(); });
            fb.addEventListener('touchend', (e) => { e.preventDefault(); fb.style.background='rgba(200,0,0,0.3)'; });

            window.updateInput = () => {
                player.rotY -= ry;
                const dir = new THREE.Vector3(mx, 0, mz).applyAxisAngle(new THREE.Vector3(0,1,0), player.rotY);
                
                // Collision simple
                const nx = player.x + dir.x * 0.1;
                const nz = player.z + dir.z * 0.1;
                if(!checkWall(nx, player.z)) player.x = nx;
                if(!checkWall(player.x, nz)) player.z = nz;

                camera.position.set(player.x, player.y, player.z);
                camera.rotation.y = player.rotY;

                if(player.z < END_Z + 1 && player.z > END_Z - 1 && Math.abs(player.x) < 2) {
                    goalReached = true;
                    alert("EXTRACTION RÉUSSIE !");
                    location.reload();
                }
            }
        }

        function checkWall(x, z) {
            return (map[Math.round(x)] && map[Math.round(x)][Math.round(z)] === 1);
        }

        function shoot() {
            AudioManager.playGunshot();
            const r = new THREE.Raycaster();
            r.setFromCamera(new THREE.Vector2(0,0), camera);
            const hits = r.intersectObjects(zombies, true);
            if(hits.length > 0) {
                const zG = hits[0].object.parent;
                scene.remove(zG);
                zombies.splice(zombies.indexOf(zG), 1);
                spawnZombie(); // Remplacer
            }
        }

        function spawnZombie() {
            const g = new THREE.Group();
            const b = new THREE.Mesh(new THREE.BoxGeometry(0.6, 1.8, 0.6), new THREE.MeshStandardMaterial({color: 0x224422}));
            b.position.y = 0.9;
            g.add(b);
            g.position.set((Math.random()-0.5)*10, 0, START_Z + Math.random()*5);
            g.userData = { speed: 0.04 + Math.random()*0.02 };
            scene.add(g);
            zombies.push(g);
        }

        function animate() {
            requestAnimationFrame(animate);
            window.updateInput();

            // Zombies
            zombies.forEach(z => {
                z.lookAt(player.x, 0.9, player.z);
                const d = new THREE.Vector3().subVectors(player.position, z.position).normalize();
                const nx = z.position.x + d.x * z.userData.speed;
                const nz = z.position.z + d.z * z.userData.speed;
                if(!checkWall(nx, z.position.z)) z.position.x = nx;
                if(!checkWall(z.position.x, nz)) z.position.z = nz;
                
                if(z.position.distanceTo(player.position) < 1) {
                    player.hp -= 0.5;
                    document.getElementById('hp-fill').style.width = player.hp + '%';
                    if(player.hp <= 0) document.getElementById('game-over').style.display = 'flex';
                }
            });

            renderer.render(scene, camera);
        }

        // DÉMARRAGE
        document.getElementById('start-btn').addEventListener('click', () => {
            document.getElementById('intro-screen').style.display = 'none';
            AudioManager.init();
            init();
            spawnZombie(); spawnZombie(); spawnZombie(); // 3 zombies au début
        });

    </script>
</body>
</html>
